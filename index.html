<style>
	html {
		width: 100%;
		height: 100%;
	}

	body {
		margin: 0;
	}

	.notice {
		position: absolute;
		padding: 10px;
		font-family: "Arial";
		font-weight: bold;
		color: #fff;
	}

	canvas#game {
		background-image: url("https://server.teunstrik.com/fussballfeld_03_c.jpg"); /* football field */
		background-repeat: no-repeat;
		background-size: 100% 100%;
		user-select: none;
		width: 100%;
		height: 100%;
		cursor: pointer;
	}

	.shooting-pointer {
	    background-color: red;
	    width: 100px;
	    height: 25px;
	    position: absolute;
	    left: 200px;
	    top: 800px;
	    writing-mode: vertical-lr;
	    font-weight: bold;
	    color: #fff;
	    font-family: "Arial";
	}

	.shooting-pointer::before {
		content: "";
		position: relative;
		display: block;
		width: 25px;
		height: 25px;
		top: 50%;
		margin-right: 100%;
		transform: translate(-50%, -50%) rotate(135deg);
		background-color: inherit;
	}
</style>

	// TO DO: Fix bugs (and wrong calculations), and calculate the mass of the ball and diameter of it with its radius
	/* initial game variables */
	var canvas = document.getElementById('game'),
		ctx = canvas.getContext("2d"),
		m = 2, // mass of ball
		x = 0, 
		y = 0,
		theta = 180 * Math.PI / 180, // shooting angle
		g = 9.8, // gravity (m/s)
		rho = 1.4, // air density
		S = .5, // drag coefficient
		D = 0.22, // diameter of the ball
		A = Math.PI * Math.pow((0.5 * D), 2), // area of ball
		cd = .5 * rho * S * A, // air resistance coefficient
		F = m * g, // calculate force with Newton's formula
		a = F / m, // calculate acceleration
		r = 20, // ball radius
		t = 0, // time
		speed = 15, // speed
		power = speed * 2, // power
		FPS = 60, // FPS
		deltaTime = 1 / FPS;

	canvas.width = window.innerWidth, canvas.height = window.innerHeight;
	// start positions
	var startX = canvas.width / 2;
	var startY = canvas.height / 2;

	function doShoot() {
		if (angle > 90 && angle < 270) { // if arrow is pointed right
			theta = Math.abs(180 - angle) * Math.PI / 180;
		} else { // if pointed left
			theta = Math.abs(360 - Math.abs(angle)) * Math.PI / 180;
		}
		var Vx = power * Math.cos(theta); // initial velocity of x component (upwards)
		var Vy = power * Math.sin(theta); // initial velocity of y

		var Ax = 0; // acceleration x component
		var Ay = -a; // acceleration y component

		Vx += Ax * t; // append acceleration of x component to velocity of x component
		Vy += Ay * t; // append acceleration of y component to velocity of y component

		var u = Math.sqrt(Math.pow(Vx, 2) + Math.pow(Vy, 2)); // velocity
		var w = D * u / Math.pow(D, 2); // calculate angular velocity
		var Fm = cd * (w * u); // calculate magnus force
		 
		var Tx = -Vx / -a; // duration of x
		var Ty = -Vy / -a; // duration of y from top to bottom

		var Dx = Vx * t; // displacement x
		var Dy = Math.pow(Vy, 2) / (a * 2) + 0.5 * a * Math.pow(t, 2); // displacement y
		var Dz = t * (power * Math.cos(theta) - a * t / m); // displacement z
		var yE = Math.tan(theta) * Dx - (a / (2 * Math.pow(u, 2) * Math.cos(theta, 2))) * Math.pow(Dy, 2); // parabola equation

		/* spaghetti code that handles the movement (from different angles) */
		if (angle > 90 && angle < 270) x = Dx + Fm / m; // x is x displacement
		else x = -Dx - Fm / m;
		if ((angle > 90 && angle < 270) === false) { // if arrow is pointed left
			if (angle < 0) {
				y = -yE - Fm / m;
			} else if (angle > 0) {
				y = yE + Fm / m;
			}
		} else { // if arrow is pointed right
			if (180 - angle > 0 && Math.abs(angle) !== 180 && Math.abs(angle) !== 270) y = -yE - Fm / m; // y is -y parabola equation
			else if (180 - angle < 0) y = yE + Fm / m;
			else if (Math.abs(angle) == 270) y = Dy;
			else if (Math.abs(angle) == 180 || Math.abs(angle) == 360) y = 0;
		}

		// draw if it is in bounds
		if (inBounds()) {	
			shoot = 1;
			// console.log(`[-] x: ${x}, y: ${y}, z: ${Dz}`);
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			ctx.beginPath(); 
			/* shadow for height effect */
			ctx.shadowColor = '#000000';
			ctx.shadowBlur = 20;
			ctx.shadowOffsetX = 0;
			ctx.shadowOffsetY = Dz;
			ctx.drawImage(ballSprite, startX + x, startY + y, 2 * r, 2 * r);
		} else {
			shoot = 0;
		}

		t += deltaTime * speed; // increment time with deltaTime and speed

		function inBounds() {
			if (Dz <= 0) { // if height is <= 0 it means it hit the ground so stop the animation
				return false;
			}

			if (startX + x + 2 * r >= canvas.width || (x < 0 && canvas.width - startX + Math.abs(x) + 2 * r >= canvas.width)) { // check if ball goes out of screen
				return false;
			}

	    	return true;
		}
	};

    var shooting_pointer = document.querySelector(".shooting-pointer");
    var wheel = 0;
	document.body.addEventListener("wheel", e => {
	    const delta = Math.sign(e.deltaY);
	    if (shoot) return false;
	    console.log(`[-] angle: ${angle}, delta: ${delta}`);
	    if (delta > 0) {
	    	angle += 10;
	    	if (angle == 360) {
	    		angle = -angle;
	    	} else if (angle == -260) {
	    		angle = 90;
	    	}
	    }
	    else if (delta < 0) {
	    	if (angle == 90) {
	    		angle = -270;
	    	} else if (angle == -350 || angle == -360) {
	    		angle = Math.abs(angle);
	    	}
	    	angle -= 10;	
	    }
	    shooting_pointer.style.transform = `rotate(${angle}deg)`; 
	    wheel = 1;
	});
	document.body.addEventListener("mousemove", e => {
		xMouse = e.pageX;
		yMouse = e.pageY;
	    shooting_pointer.style.left = xMouse;
	    shooting_pointer.style.top = yMouse;
	});

	// mouse events (long-pressing, etc), stolen from stackoverflow
    var mouseDown = 0;
	document.body.onmousedown = function() { 
	    mouseDown = 1;
	    speed = 0; // reset speed
	}
	document.body.onmouseup = function() {
	    shoot = 1, mouseDown = 0, wheel = 0;
	    t = 0; // reset timer
	    startX = xMouse;
	    startY = yMouse;
	    power = speed * 4; // power
       	theta = (180 - angle) * Math.PI / 180;
       	kick_audio.play();
        console.log(`power: ${ power }, angle: ${ 180 - angle }`);
	}

	// hotfix for mouseup event not firing bug, stolen from stackoverflow
	document.querySelector('html').addEventListener('mouseup', function (e) {
	    var evt = document.createEvent("MouseEvents");
	    evt.initEvent("mouseup", true, true);
	});

	/* Game loop */
   	(function gameloop() {
        window.requestAnimationFrame(gameloop);
        if (wheel == 0 && mouseDown == 0) {
        	doShoot();
        }
       	else if (mouseDown == 1 && speed < 30) {
       		speed++;
       		shooting_pointer.innerText = speed;
       	}
    })();
</script>
